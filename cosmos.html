<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashraf Hawwash | Data Universe</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000008;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .cosmos-container {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* دوائر المدارات */
        .orbit {
            position: absolute;
            border: 1px solid rgba(0, 170, 255, 0.08);
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        @keyframes spin1 {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* الحركات (Animations) */
        @keyframes fadeup {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            color: #fff;
        }

        .btn-launch {
            margin-top: 2rem;
            padding: 12px 32px;
            border: 1px solid #00aaff;
            color: #00aaff;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 4px;
            opacity: 0;
            animation: fadeup 1s 2s forwards;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-launch:hover {
            background: #00aaff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 170, 255, 0.4);
        }
    </style>
</head>
<body>

<div class="cosmos-container">
    <canvas id="s1" style="position:absolute; inset:0; width:100%; height:100%;"></canvas>
    
    <div class="orbit" style="width:300px; height:300px; animation: spin1 18s linear infinite;"></div>
    <div class="orbit" style="width:500px; height:500px; border-color:rgba(0,170,255,0.05); animation: spin1 30s linear infinite;"></div>
    <div class="orbit" style="width:700px; height:700px; border-color:rgba(0,170,255,0.03); animation: spin1 50s linear infinite;"></div>

    <div class="content">
        <div style="font-size:16px; letter-spacing:4px; text-transform:uppercase; color:#00aaff; opacity:0; animation:fadeup 1s 1s forwards;">Explore Your<br>Data Universe</div>
        <div style="font-size:clamp(30px, 8vw, 60px); font-weight:700; margin:12px 0 8px; opacity:0; animation:fadeup 1s 1.3s forwards; text-shadow:0 0 40px rgba(0,170,255,0.4);">Ashraf Hawwash</div>
        <div style="font-size:18px; color:rgba(255,255,255,0.5); opacity:0; animation:fadeup 1s 1.6s forwards; max-width:500px; line-height:1.7;">Transform raw numbers into constellations of insight.<br>Every metric tells a story across the cosmos of your business.</div>
        
        <a href="index.html" class="btn-launch">Back to Home</a>
    </div>
</div>

<script>
    var c=document.getElementById('s1'), x=c.getContext('2d'), w, h, st=[];
    function ri(){
        w=c.width=window.innerWidth;
        h=c.height=window.innerHeight;
        st=Array.from({length:200}, function(){
            return {x:Math.random()*w, y:Math.random()*h, r:Math.random()*1.2+.2, a:Math.random(), sp:Math.random()*1.3+.05, tw:Math.random()*Math.PI*2};
        });
    }
    function dr(){
        x.clearRect(0,0,w,h);
        st.forEach(function(s){
            s.tw+=0.02; s.a=0.3+Math.sin(s.tw)*0.3;
            x.beginPath(); x.arc(s.x, s.y, s.r, 0, Math.PI*2);
            x.fillStyle='rgba(200,220,255,'+s.a+')'; x.fill();
            s.y-=s.sp; if(s.y<0) s.y=h;
        });
        requestAnimationFrame(dr);
    }
    ri(); dr(); window.addEventListener('resize', ri);
</script>

</body>
</html>
